services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: slotsync
      POSTGRES_PASSWORD: slotsync
      POSTGRES_DB: slotsync
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slotsync"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: ./api
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://slotsync:slotsync@postgres:5432/slotsync
      REDIS_URL: redis://redis:6379
      PORT: 4000
    volumes:
      - ./api/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata: